# Repo raíz = carpeta del backend.
# Secrets: RAILWAY_TOKEN, RAILWAY_SERVICE_ID
# Railway: Root Directory vacío o "."
#
# Job build: compila y testea. Job deploy: sube a Railway solo si build pasó.

name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'pom.xml'
      - 'src/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

concurrency:
  group: railway-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # En Windows el bit ejecutable no siempre se guarda en Git → falla en Linux
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -B verify

  deploy:
    name: Deploy (Railway)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=${{ secrets.RAILWAY_SERVICE_ID }} --detach
