# Ejemplo R2 — copia valores a application-local.properties o variables de entorno.
# Prefijo surequinos.r2 (no uses cloudflare.* en nombres de variable en Railway: Railpack lo confunde con un build secret).

surequinos.r2.account-id=your-cloudflare-account-id
surequinos.r2.access-key-id=your-r2-access-key-id
surequinos.r2.secret-access-key=your-r2-secret-access-key
surequinos.r2.bucket-name=surequinos-images
surequinos.r2.region=auto
surequinos.r2.endpoint=https://your-account-id.r2.cloudflarestorage.com
surequinos.r2.public-url=https://your-custom-domain.com
