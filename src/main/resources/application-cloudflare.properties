# Configuración de ejemplo para Cloudflare R2
# Copia este archivo y renómbralo a application-local.properties
# Luego configura tus credenciales reales

# Cloudflare R2 Configuration
cloudflare.r2.account-id=your-cloudflare-account-id
cloudflare.r2.access-key-id=your-r2-access-key-id
cloudflare.r2.secret-access-key=your-r2-secret-access-key
cloudflare.r2.bucket-name=surequinos-images
cloudflare.r2.region=auto
cloudflare.r2.endpoint=https://your-account-id.r2.cloudflarestorage.com
cloudflare.r2.public-url=https://your-custom-domain.com

# Instrucciones para configurar Cloudflare R2:
# 1. Ve a tu dashboard de Cloudflare
# 2. Selecciona R2 Object Storage
# 3. Crea un bucket llamado "surequinos-images"
# 4. Ve a "Manage R2 API tokens"
# 5. Crea un token con permisos de lectura y escritura
# 6. Configura un dominio personalizado para acceso público
# 7. Reemplaza los valores de ejemplo con tus credenciales reales