spring.application.name=surequinos-backend

# Opcional: credenciales locales en application-local.properties (gitignored)
spring.config.import=optional:classpath:application-local.properties

# Database — definir en Railway o en application-local.properties (no subir secretos)
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
sspring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration (Railway inyecta PORT; local usa 8080)
server.port=${PORT:8080}
server.servlet.context-path=/api

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.surequinos=DEBUG
logging.level.org.springframework.web=DEBUG

# R2 (Cloudflare) en entorno: evita usar prefijo "cloudflare.*" para no romper build en Railway
surequinos.r2.account-id=${SUREQUINOS_R2_ACCOUNT_ID:}
surequinos.r2.access-key-id=${SUREQUINOS_R2_ACCESS_KEY_ID:}
surequinos.r2.secret-access-key=${SUREQUINOS_R2_SECRET_ACCESS_KEY:}
surequinos.r2.bucket-name=${SUREQUINOS_R2_BUCKET_NAME:surequinos}
surequinos.r2.region=${SUREQUINOS_R2_REGION:auto}
surequinos.r2.endpoint=${SUREQUINOS_R2_ENDPOINT:}
surequinos.r2.public-url=${SUREQUINOS_R2_PUBLIC_URL:}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Spring Boot DevTools Configuration
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=${SPRING_DEVTOOLS_LIVERELOAD_ENABLED:false}
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.exclude=static/**,public/**,templates/**
# 
JWT Configuration
jwt.secret=surequinos-secret-key-change-this-in-production-minimum-256-bits-required-for-hs256-algorithm-security
jwt.expiration=86400000
