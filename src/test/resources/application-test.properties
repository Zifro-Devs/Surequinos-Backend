spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Evitar fallos por default_schema en tests
spring.jpa.properties.hibernate.default_schema=

# Mantener el mismo context-path que prod
server.servlet.context-path=/api

# Dummy R2 config for tests (solo para instanciar beans; no se usa realmente)
surequinos.r2.account-id=test
surequinos.r2.access-key-id=test
surequinos.r2.secret-access-key=test
surequinos.r2.bucket-name=test
surequinos.r2.region=us-east-1
surequinos.r2.endpoint=http://localhost:4566
surequinos.r2.public-url=http://localhost:4566/test
